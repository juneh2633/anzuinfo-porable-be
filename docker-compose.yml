services:
  postgres:
    image: postgres:17-alpine
    container_name: anzu-postgres
    restart: unless-stopped
    networks:
      - anzu_net
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "postgres" -d "postgres"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anzu-redis
    restart: unless-stopped
    networks:
      - anzu_net
    deploy:
      resources:
        limits:
          memory: 128M
    command: redis-server --requirepass ${DB_REDIS_PASSWORD:-example_redis_pw!} --port ${DB_REDIS_PORT:-6379}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '${DB_REDIS_PORT:-6379}', '-a', '${DB_REDIS_PASSWORD:-example_redis_pw!}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/juneh2633/anzu-info:${IMAGE_TAG:-latest}
    container_name: anzu-info
    restart: unless-stopped
    networks:
      - anzu_net
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=redis

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: anzu-npm
    restart: unless-stopped
    networks:
      - anzu_net
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./docker/npm/data:/data
      - ./docker/npm/letsencrypt:/etc/letsencrypt
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:

networks:
  anzu_net:
    driver: bridge

